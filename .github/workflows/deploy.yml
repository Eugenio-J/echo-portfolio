name: Deploy React App to GitHub Pages

on:
  push:
    branches:
      - main

permissions:
  contents: write

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 18

      - name: Install dependencies
        run: npm install

        - name: Build
        run: npm run build

      - name: Configure Git identity
        run: 
          git config --global user.name "Eugenio-J"
          git config --global user.email "jerichoeugenio2@gmail.com"

      - name: Deploy to GitHub Pages
        run: npm run deploy